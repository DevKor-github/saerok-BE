notification-messages:
  types:
    LIKED_ON_COLLECTION:
      push-title: "{actorName}"
      push-body: "나의 새록을 좋아해요."
      batch-push-title: "{actorName} 외 {othersCount}명"
      batch-push-body: "나의 새록을 좋아해요."
    COMMENTED_ON_COLLECTION:
      push-title: "{actorName}"
      push-body: "나의 새록에 댓글을 남겼어요. \"{comment}\""
      batch-push-title: "{actorName} 외 {othersCount}명"
      batch-push-body: "나의 새록에 댓글을 남겼어요."
    REPLIED_TO_COMMENT:
      push-title: "{actorName}"
      push-body: "나의 댓글에 답글을 남겼어요. \"{comment}\""
      batch-push-title: "{actorName} 외 {othersCount}명"
      batch-push-body: "나의 댓글에 답글을 남겼어요."
    SUGGESTED_BIRD_ID_ON_COLLECTION:
      push-title: "동정 의견 공유"
      push-body: "두근두근! 새로운 의견이 공유되었어요. 확인해볼까요?"
      batch-push-title: "동정 의견 공유"
      batch-push-body: "{count}개의 새로운 의견이 공유되었어요. 확인해볼까요?"
    SYSTEM_PUBLISHED_ANNOUNCEMENT:
      push-title: "{title}"
      push-body: "{body}"
    SYSTEM_ADMIN_MESSAGE:
      push-title: "{title}"
      push-body: "{body}"
    SYSTEM_CONTENT_DELETED:
      push-title: "콘텐츠 삭제 안내"
      push-body: "회원님의 콘텐츠가 운영정책 위반으로 삭제되었어요. 사유: {reason}"